<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>כרטיס אדום Hochschwarzwald – חיפוש אטרקציות 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f5f0;color:#222;direction:rtl}

/* ── Header ── */
.header{background:#c0392b;color:#fff;padding:16px 20px;text-align:center}
.header h1{font-size:1.5rem;font-weight:700}
.header p{font-size:.85rem;opacity:.85;margin-top:4px}

/* ── Card images ── */
.card-imgs{display:flex;gap:16px;justify-content:center;align-items:center;
  padding:14px 20px;background:#fff;border-bottom:1px solid #ddd;flex-wrap:wrap}
.card-imgs img{height:80px;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.card-img-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.card-img-label{font-size:1rem;font-weight:700;color:#333;text-align:center}

/* ── Search ── */
.search-bar{padding:14px 20px;background:#fff;border-bottom:1px solid #ddd;position:sticky;top:0;z-index:10}
#searchInput{width:100%;padding:10px 14px;font-size:1rem;border:2px solid #c0392b;
  border-radius:8px;direction:rtl;outline:none;background:#fff}
#searchInput:focus{border-color:#922b21;box-shadow:0 0 0 3px rgba(192,57,43,.15)}
#searchInput::placeholder{color:#aaa}

/* ── Filters ── */
.filters{display:flex;gap:8px;padding:10px 20px;background:#fff;
  border-bottom:1px solid #ddd;flex-wrap:wrap;align-items:center}
.filters span{font-size:.8rem;color:#666;margin-left:4px;white-space:nowrap}
.filter-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #ccc;
  background:#fff;cursor:pointer;font-size:.82rem;transition:all .15s;white-space:nowrap}
.filter-btn:hover{border-color:#c0392b;color:#c0392b}
.filter-btn.active{background:#c0392b;border-color:#c0392b;color:#fff;font-weight:600}

/* ── Results header ── */
.results-header{padding:8px 20px;font-size:.82rem;color:#777;background:#f5f5f0}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));
  gap:12px;padding:12px 20px 24px}

/* ── Card ── */
.card{background:#fff;border-radius:10px;border:1px solid #e0e0e0;
  overflow:hidden;transition:box-shadow .15s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.card-head{background:#c0392b;color:#fff;padding:10px 14px;display:flex;
  align-items:flex-start;gap:8px}
.card-head h3{font-size:.9rem;font-weight:600;flex:1;line-height:1.3}
.badge{font-size:.7rem;padding:2px 7px;border-radius:10px;white-space:nowrap;
  font-weight:600;flex-shrink:0;margin-top:1px}
.badge-included{background:#27ae60;color:#fff}
.badge-special{background:#e67e22;color:#fff}
.badge-season{font-size:.7rem;padding:2px 6px;border-radius:10px;white-space:nowrap;
  margin-right:4px;flex-shrink:0;margin-top:1px}
.badge-all{background:rgba(255,255,255,.25);color:#fff}
.badge-summer{background:#f39c12;color:#fff}
.badge-winter{background:#2980b9;color:#fff}
.card-body{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.row{display:flex;gap:8px;align-items:flex-start}
.row-icon{font-size:.9rem;flex-shrink:0;margin-top:2px}
.row-label{font-size:.7rem;color:#999;font-weight:600;text-transform:uppercase;
  letter-spacing:.04em;display:block;margin-bottom:1px}
.row-text{font-size:.82rem;color:#333;line-height:1.45}
.row-text a{color:#c0392b;text-decoration:none;word-break:break-all}
.row-text a:hover{text-decoration:underline}
.divider{border:none;border-top:1px solid #f0f0f0;margin:0}

/* ── Empty ── */
.empty{text-align:center;padding:48px 20px;color:#aaa}
.empty h3{font-size:1.1rem;margin-bottom:6px}
/* -- Black card -- */
.card-black .card-head{background:#1a1a2e}
.badge-card{font-size:.65rem;padding:2px 7px;border-radius:10px;white-space:nowrap;font-weight:600;flex-shrink:0;margin-top:1px;margin-left:4px}
.badge-card-red{background:rgba(255,255,255,.2);color:#fff}
.badge-card-black{background:#f0c040;color:#1a1a1a}

</style>

let fSeason = 'all-season';
let fBt = 'all-bt';
let fCard = 'all-card';
let timer;

const seasonLabel = {all:'כל עונות השנה', summer:'קיץ', winter:'חורף'};
const seasonClass = {all:'all', summer:'summer', winter:'winter'};

function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function nlbr(s){
  return esc(s).replace(/\n/g,'<br>');
}

function render(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();

  const filtered = A.filter(item => {
    const seasonMatch =
      fSeason === 'all-season' ||
      item.season === fSeason;
    const btMatch =
      fBt === 'all-bt' ||
      item.bt === fBt;
    const cardMatch =
      fCard === 'all-card' ||
      item.card === fCard;
    const searchMatch = !q ||
      item.name.toLowerCase().includes(q) ||
      item.url.toLowerCase().includes(q) ||
      item.benefit.toLowerCase().includes(q) ||
      item.note.toLowerCase().includes(q) ||
      item.addr.toLowerCase().includes(q);
    return seasonMatch && btMatch && cardMatch && searchMatch;
  });

  const grid = document.getElementById('grid');
  const hdr = document.getElementById('resultsHeader');

  hdr.textContent = filtered.length === A.length
    ? `מציג את כל ${A.length} האטרקציות`
    : `נמצאו ${filtered.length} מתוך ${A.length} אטרקציות`;

  if(!filtered.length){
    grid.innerHTML = '<div class="empty"><h3>לא נמצאו תוצאות</h3><p>נסה מילת חיפוש אחרת</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(item => {
    const btBadge = item.bt === 'included'
      ? '<span class="badge badge-included">כלול ✓</span>'
      : '<span class="badge badge-special">מחיר מיוחד ★</span>';
    const sLabel = seasonLabel[item.season] || item.season;
    const sCls   = seasonClass[item.season] || 'all';
    const seasonBadge = `<span class="badge badge-season badge-${sCls}">${sLabel}</span>`;
    const urlLink = item.url
      ? `<a href="https://${item.url}" target="_blank" rel="noopener">${esc(item.url)}</a>`
      : '';

    const cardCls = item.card === 'black' ? ' card-black' : '';
    const cardBadge = item.card === 'black' ? '<span class="badge badge-card badge-card-black">🖤 שחור</span>' : '<span class="badge badge-card badge-card-red">🔴 אדום</span>';
    return `
<div class="card${cardCls}">
  <div class="card-head">
    <h3>${esc(item.name)}</h3>
    ${cardBadge}${seasonBadge}${btBadge}
  </div>
  <div class="card-body">
    ${urlLink ? `
    <div class="row">
      <span class="row-icon">🌐</span>
      <div><span class="row-label">אתר אינטרנט</span>
      <span class="row-text">${urlLink}</span></div>
    </div><hr class="divider">` : ''}
    <div class="row">
      <span class="row-icon">🎁</span>
      <div><span class="row-label">תיאור ההטבה</span>
      <span class="row-text">${esc(item.benefit)}</span></div>
    </div>
    ${item.note && item.note !== '—' ? `<hr class="divider">
    <div class="row">
      <span class="row-icon">📋</span>
      <div><span class="row-label">תנאים / הערות / שעות פתיחה</span>
      <span class="row-text">${esc(item.note)}</span></div>
    </div>` : ''}
    ${item.addr ? `<hr class="divider">
    <div class="row">
      <span class="row-icon">📍</span>
      <div><span class="row-label">כתובת / יצירת קשר</span>
      <span class="row-text">${nlbr(item.addr)}</span></div>
    </div>` : ''}
  </div>
</div>`;
  }).join('');
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filter;
    const v = btn.dataset.val;
    if(f === 'season') fSeason = v;
    if(f === 'bt')     fBt = v;
    if(f === 'card')   fCard = v;
    // Update active state within same group
    document.querySelectorAll(`[data-filter="${f}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// Search with debounce
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(render, 150);
});

render();
</script>
